name: Prepare toolbox release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Matches tags like v1.2.3
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump; the new version is inferred from the latest release tag'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version:
        description: 'Explicit version override in major.minor.patch format; takes precedence over bump'
        required: false
        type: string

jobs:
  prepare-release:
    name: Prepare toolbox release
    uses: ehennestad/matbox-actions/.github/workflows/prepare-release-workflow.yml@v1
    with:
      version: ${{ inputs.version }}
      ref_name: ${{ github.ref_name }}
      source_directory: code
      tests_directory: tools/tests
      tools_directory: tools
      needs_python: true
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
